<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="theme-color" content="#04080F"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="robots" content="noindex, nofollow"/>
<title>إنشاء وثيقة — وثيقتي</title>
<link rel="manifest" href="/manifest.json"/>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--g:#C9A84C;--g2:#E8C97A;--bg:#04080F;--bg2:#080E1A;--card:#0A1628;--txt:#E8E4D8;--txt2:#8A9AB8;--txt3:#3A4A60}
[data-theme=light]{--bg:#F0EDE6;--bg2:#E8E4DC;--card:#FFFFFF;--txt:#12100A;--txt2:#40382C;--txt3:#80786C}
body{font-family:'Cairo',sans-serif;background:var(--bg);color:var(--txt);height:100vh;display:flex;flex-direction:column;overflow:hidden}
.topbar{background:var(--bg2);border-bottom:1px solid rgba(201,168,76,0.1);padding:10px 18px;display:flex;align-items:center;gap:12px;flex-shrink:0}
.back-btn{padding:7px 14px;background:transparent;border:1px solid rgba(201,168,76,0.2);border-radius:8px;color:var(--txt2);font-family:'Cairo',sans-serif;font-size:13px;cursor:pointer;transition:all 0.2s;flex-shrink:0}
.back-btn:hover{border-color:var(--g);color:var(--g)}
.doc-title{font-size:14px;font-weight:700;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tb-actions{display:flex;gap:8px;flex-shrink:0;align-items:center}
.tb-btn{padding:8px 16px;border-radius:8px;font-family:'Cairo',sans-serif;font-size:12.5px;font-weight:700;cursor:pointer;border:none;transition:all 0.2s;display:flex;align-items:center;gap:6px}
.tb-btn-gen{background:linear-gradient(135deg,var(--g),var(--g2));color:#000}
.tb-btn-gen:hover{transform:translateY(-1px);box-shadow:0 6px 18px rgba(201,168,76,0.35)}
.tb-btn-gen:disabled{opacity:0.55;cursor:not-allowed;transform:none}
.tb-btn-print{background:rgba(52,152,219,0.12);color:#5DADE2;border:1px solid rgba(52,152,219,0.25)}
.tb-btn-print:hover{background:rgba(52,152,219,0.22)}
.tb-btn-pdf{background:rgba(231,76,60,0.12);color:#E74C3C;border:1px solid rgba(231,76,60,0.25)}
.tb-btn-pdf:hover{background:rgba(231,76,60,0.22)}
.tb-btn-share{background:rgba(155,89,182,0.12);color:#A569BD;border:1px solid rgba(155,89,182,0.25)}
.tb-btn-share:hover{background:rgba(155,89,182,0.22)}
.tb-btn-save{background:rgba(46,204,113,0.1);color:#2ECC71;border:1px solid rgba(46,204,113,0.2)}
.icon-btn{width:32px;height:32px;border-radius:8px;background:transparent;border:1px solid rgba(201,168,76,0.15);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--txt);transition:all 0.2s}
.icon-btn:hover{border-color:var(--g)}
.main{display:flex;flex:1;overflow:hidden}
.form-panel{width:360px;flex-shrink:0;background:var(--bg2);border-left:1px solid rgba(201,168,76,0.08);display:flex;flex-direction:column;overflow:hidden}
.form-scroll{flex:1;overflow-y:auto;padding:18px}
.preview-panel{flex:1;background:#e8e4dc;display:flex;flex-direction:column;overflow:hidden}
.preview-wrap{flex:1;overflow:hidden;position:relative}
.preview-iframe{width:100%;height:100%;border:none;background:#fff}
.preview-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:#888;gap:12px;background:#f0ede6}
.preview-empty-ico{font-size:48px}
.preview-empty-txt{font-size:14px;font-weight:600;color:#555}
.preview-empty-sub{font-size:12px;text-align:center;max-width:260px;line-height:1.7;color:#888}
.form-header{padding:16px 18px;border-bottom:1px solid rgba(201,168,76,0.08);font-size:13px;font-weight:700;color:var(--g2);display:flex;align-items:center;gap:8px}
.fgrp{margin-bottom:13px}
.flbl{display:block;font-size:11.5px;font-weight:700;color:var(--txt2);margin-bottom:4px}
.req{color:var(--g);font-size:10px;margin-right:3px}
.finp,.fsel,.farea{width:100%;background:rgba(255,255,255,0.03);border:1.5px solid rgba(255,255,255,0.07);border-radius:8px;padding:9px 11px;color:var(--txt);font-family:'Cairo',sans-serif;font-size:12.5px;outline:none;transition:border-color 0.2s;-webkit-appearance:none}
.finp:focus,.fsel:focus,.farea:focus{border-color:var(--g);background:rgba(201,168,76,0.02)}
.farea{resize:vertical;min-height:75px;line-height:1.7}
[data-theme=light] .finp,[data-theme=light] .fsel,[data-theme=light] .farea{background:rgba(0,0,0,0.04);border-color:rgba(0,0,0,0.12);color:var(--txt)}
.submit-row{padding:14px 18px;border-top:1px solid rgba(201,168,76,0.08);flex-shrink:0}
.btn-gen-full{width:100%;padding:11px;background:linear-gradient(135deg,var(--g),var(--g2));color:#000;border:none;border-radius:9px;font-family:'Cairo',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:all 0.2s}
.btn-gen-full:hover{transform:translateY(-1px);box-shadow:0 8px 22px rgba(201,168,76,0.35)}
.btn-gen-full:disabled{opacity:0.55;cursor:not-allowed;transform:none}
.alert{padding:9px 12px;border-radius:8px;font-size:12px;margin-bottom:10px;display:none}
.alert.on{display:block}
.alert-ok{background:rgba(46,204,113,0.1);border:1px solid rgba(46,204,113,0.3);color:#2ECC71}
.alert-err{background:rgba(231,76,60,0.1);border:1px solid rgba(231,76,60,0.3);color:#E74C3C}
.alert-info{background:rgba(201,168,76,0.1);border:1px solid rgba(201,168,76,0.3);color:var(--g2)}
.spin{display:inline-block;animation:spin 1s linear infinite}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.preview-toolbar{background:var(--bg2);border-bottom:1px solid rgba(201,168,76,0.06);padding:8px 14px;display:none;align-items:center;justify-content:space-between;flex-shrink:0}
.preview-toolbar.on{display:flex}
.preview-label{font-size:12px;color:var(--txt2);font-weight:700}
/* ══════════════════════════════════════
   RESPONSIVE DOCUMENT PAGE
   ══════════════════════════════════════ */

/* ── Print ── */
@media print{
  .topbar,.form-panel,.preview-toolbar{display:none!important}
  .preview-panel{width:100vw!important;background:#fff!important}
  .preview-iframe{height:100vh!important}
}

/* ── Tablet (≤900px) ── */
@media(max-width:900px){
  .form-panel{width:320px}
  .tb-btn span{font-size:0;width:0;overflow:hidden;display:inline-block}
  .tb-btn{padding:8px 10px}
}

/* ── Mobile (≤768px) ── */
@media(max-width:768px){
  /* Topbar */
  .topbar{padding:8px 12px;gap:8px}
  .back-btn{padding:7px 10px;font-size:12px}
  .doc-title{font-size:13px}
  .tb-btn{padding:8px 10px;font-size:0}
  .tb-btn::before{font-size:16px}
  .tb-btn-gen{font-size:13px!important;padding:8px 14px}
  .icon-btn{width:30px;height:30px;font-size:13px}

  /* Layout: form on bottom, preview on top */
  .main{flex-direction:column-reverse}
  .form-panel{
    width:100%;
    height:50vh;
    min-height:280px;
    border-left:none;
    border-top:1px solid rgba(201,168,76,0.12)
  }
  .preview-panel{
    flex:1;
    min-height:40vh
  }

  /* Form */
  .form-scroll{padding:14px}
  .form-header{padding:12px 14px;font-size:12px}
  .fgrp{margin-bottom:11px}
  .flbl{font-size:11px}
  .finp,.fsel,.farea{font-size:13px;padding:8px 10px}
  .submit-row{padding:10px 14px}
  .btn-gen-full{padding:11px;font-size:13px}

  /* Alert */
  .alert{font-size:11.5px;padding:8px 11px}
}

/* ── Mobile Small (≤480px) ── */
@media(max-width:480px){
  .tb-actions{gap:5px}
  .back-btn{padding:6px 9px;font-size:11px}
  .doc-title{max-width:120px}
  .form-panel{height:55vh}
  .preview-panel{min-height:35vh}
}

/* ── Touch ── */
@media(hover:none){
  .tb-btn-gen:hover{transform:none;box-shadow:none}
  .tb-btn-gen:active{transform:scale(0.97)}
  .back-btn:hover{border-color:rgba(201,168,76,0.2);color:var(--txt2)}
  .back-btn:active{background:rgba(201,168,76,0.08)}
  .btn-gen-full:hover{transform:none;box-shadow:none}
  .btn-gen-full:active{transform:scale(0.98)}
}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:rgba(201,168,76,0.2);border-radius:2px}
</style>
</head>
<body>
<div class="topbar">
  <button class="back-btn" onclick="window.location.href='/dashboard'" aria-label="العودة للوحة التحكم">← رجوع</button>
  <div class="doc-title" id="docTitle">جاري التحميل...</div>
  <div class="tb-actions">
    <button class="icon-btn" onclick="toggleTheme()" id="themeBtn" title="تبديل الوضع">🌙</button>
    <button class="tb-btn tb-btn-save" id="saveBtn" onclick="doSave()" style="display:none" aria-label="حفظ الوثيقة">💾 <span>حفظ</span></button>
    <button class="tb-btn tb-btn-print" id="printBtn" onclick="doPrint()" style="display:none" aria-label="طباعة الوثيقة">🖨️ <span>طباعة</span></button>
    <button class="tb-btn tb-btn-pdf" id="pdfBtn" onclick="doPDF()" style="display:none" aria-label="تحميل PDF">📥 <span>PDF</span></button>
    <button class="tb-btn tb-btn-share" id="shareBtn" onclick="doShare()" style="display:none" aria-label="مشاركة الوثيقة">🔗 <span>مشاركة</span></button>
    <button class="tb-btn tb-btn-gen" id="genBtn" onclick="doGenerate()" disabled aria-label="توليد الوثيقة">⚡ <span>توليد</span></button>
  </div>
</div>

<div class="main" role="main">
  <div class="form-panel" role="complementary" aria-label="نموذج بيانات الوثيقة">
    <div class="form-header">✍️ <span id="formTitle">بيانات الوثيقة</span></div>
    <div class="form-scroll">
      <div class="alert" id="formAlert" role="alert" aria-live="assertive"></div>
      <div id="formFields"><div style="text-align:center;padding:30px;color:var(--txt3)">جاري تحميل النموذج...</div></div>
    </div>
    <div class="submit-row">
      <button class="btn-gen-full" id="genBtn2" onclick="doGenerate()" disabled>⚡ توليد الوثيقة</button>
    </div>
  </div>

  <div class="preview-panel" role="region" aria-label="معاينة الوثيقة">
    <div class="preview-toolbar" id="previewToolbar">
      <span class="preview-label">📄 معاينة الوثيقة — A4</span>
      <div style="display:flex;gap:8px;align-items:center">
        <button onclick="zoomPreview(-10)"
          style="background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);color:var(--txt2);border-radius:6px;padding:3px 9px;cursor:pointer;font-size:14px"
          aria-label="تصغير المعاينة" title="تصغير">−</button>
        <span id="zoomLbl" style="font-size:11px;color:var(--txt3);min-width:36px;text-align:center">100%</span>
        <button onclick="zoomPreview(10)"
          style="background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);color:var(--txt2);border-radius:6px;padding:3px 9px;cursor:pointer;font-size:14px"
          aria-label="تكبير المعاينة" title="تكبير">+</button>
        <span style="font-size:11px;color:var(--txt3)">الوثيقة جاهزة للطباعة</span>
      </div>
    </div>
    <div class="preview-wrap" id="previewWrap">
      <div class="preview-empty" id="previewEmpty">
        <div class="preview-empty-ico">📄</div>
        <div class="preview-empty-txt">المعاينة ستظهر هنا</div>
        <div class="preview-empty-sub">أدخل البيانات في النموذج ثم اضغط "توليد الوثيقة"</div>
      </div>
      <iframe id="previewFrame" class="preview-iframe" style="display:none"></iframe>
    </div>
  </div>
</div>

<script>
let theme = localStorage.getItem('wq_theme') || 'dark';
applyTheme();
function applyTheme(){
  document.body.setAttribute('data-theme', theme==='light'?'light':'');
  document.getElementById('themeBtn').textContent = theme==='dark'?'🌙':'☀️';
}
function toggleTheme(){theme=theme==='dark'?'light':'dark';applyTheme();localStorage.setItem('wq_theme',theme);}

const docType = window.location.pathname.split('/doc/')[1];
let currentHTML = '';
let tplData = null;
const DRAFT_KEY = 'wq_draft_' + docType;

// ── تحميل الصفحة
async function init(){
  const me = await fetch('/api/auth/me').then(r=>r.json());
  if(!me.loggedIn){window.location.href='/';return;}
  if(me.expired){
    showAlert('formAlert','err','⛔ انتهى اشتراكك. يُرجى التفعيل.');
    document.getElementById('genBtn').disabled = true;
    document.getElementById('genBtn2').disabled = true;
    setTimeout(()=>window.location.href='/dashboard', 3000);
    return;
  }
  if(!/^[a-z_]{2,50}$/.test(docType)){window.location.href='/dashboard';return;}

  const r = await fetch('/api/docs/tpl/'+docType).then(x=>x.json());
  if(!r.success){
    document.getElementById('formFields').innerHTML =
      '<div style="color:#E74C3C;text-align:center;padding:24px;font-size:13px">⚠️ الوثيقة غير موجودة</div>';
    return;
  }
  tplData = r.template;
  document.title = (tplData.title||docType) + ' — وثيقتي';
  document.getElementById('docTitle').textContent = tplData.title || docType;
  document.getElementById('formTitle').textContent = tplData.title || docType;
  buildForm(tplData.fields || []);
  loadDraft();
  document.getElementById('genBtn').disabled = false;
  document.getElementById('genBtn2').disabled = false;
  // SW
  if('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(()=>{});
}

// ── بناء النموذج
function buildForm(fields){
  const wrap = document.getElementById('formFields');
  wrap.innerHTML = '';
  if(!fields.length){
    wrap.innerHTML = '<div style="text-align:center;padding:20px;color:var(--txt3)">لا توجد حقول لهذه الوثيقة</div>';
    return;
  }
  (fields||[]).forEach(f=>{
    const g = document.createElement('div');
    g.className = 'fgrp';
    g.dataset.field = f.n;

    const lbl = document.createElement('label');
    lbl.className = 'flbl';
    lbl.setAttribute('for', 'f_'+f.n);
    lbl.innerHTML = f.l + (f.r ? '<span class="req">*</span>' : '');
    g.appendChild(lbl);

    let el;
    if(f.t === 'sel'){
      el = document.createElement('select');
      el.className = 'fsel';
      el.innerHTML = '<option value="">— اختر —</option>' +
        (f.opts||[]).map(o=>`<option value="${o}">${o}</option>`).join('');
    } else if(f.t === 'area'){
      el = document.createElement('textarea');
      el.className = 'farea';
      el.placeholder = f.pl || f.l;
      el.rows = 3;
    } else {
      el = document.createElement('input');
      el.className = 'finp';
      el.type = f.t==='number'?'number' : f.t==='date'?'date' : 'text';
      el.placeholder = f.pl || f.l;
      if(f.t === 'text') el.autocomplete = 'off';
    }
    el.id = 'f_'+f.n;
    el.name = f.n;
    if(f.t === 'date' && !f.noDefault)
      el.value = new Date().toISOString().split('T')[0];

    // Auto-save draft on input
    el.addEventListener('input', saveDraft);
    el.addEventListener('change', saveDraft);

    g.appendChild(el);
    wrap.appendChild(g);
  });
}

// ── Draft (حفظ تلقائي في localStorage)
function saveDraft(){
  try {
    const data = getFormData();
    localStorage.setItem(DRAFT_KEY, JSON.stringify(data));
  } catch(e){}
}

function loadDraft(){
  try {
    const saved = localStorage.getItem(DRAFT_KEY);
    if(!saved) return;
    const data = JSON.parse(saved);
    let loaded = 0;
    Object.entries(data).forEach(([key, val]) => {
      const el = document.getElementById('f_'+key);
      if(el && val) { el.value = val; loaded++; }
    });
    if(loaded > 0){
      showAlert('formAlert','info', '📝 تم استعادة بياناتك المحفوظة مسبقاً');
    }
  } catch(e){}
}

function clearDraft(){
  try { localStorage.removeItem(DRAFT_KEY); } catch(e){}
}

// ── جلب بيانات النموذج
function getFormData(){
  const d = {};
  (tplData.fields||[]).forEach(f=>{
    const el = document.getElementById('f_'+f.n);
    if(el) d[f.n] = el.value;
  });
  return d;
}

// ── تحقق مع تظليل الحقول الناقصة
function validate(){
  const missing = [];
  // إزالة التظليل القديم
  document.querySelectorAll('.finp,.fsel,.farea').forEach(el=>{
    el.style.borderColor = '';
  });
  (tplData.fields||[]).filter(f=>f.r).forEach(f=>{
    const el = document.getElementById('f_'+f.n);
    if(el && !el.value.trim()){
      missing.push(f.l);
      // تظليل الحقل الناقص
      el.style.borderColor = '#E74C3C';
      el.style.boxShadow = '0 0 0 2px rgba(231,76,60,0.15)';
    }
  });
  if(missing.length){
    // التمرير للحقل الأول الناقص
    const firstMissing = (tplData.fields||[]).filter(f=>f.r).find(f=>{
      const el = document.getElementById('f_'+f.n);
      return el && !el.value.trim();
    });
    if(firstMissing){
      const el = document.getElementById('f_'+firstMissing.n);
      el?.scrollIntoView({behavior:'smooth', block:'center'});
      setTimeout(()=>el?.focus(), 300);
    }
  }
  return missing;
}

// ── توليد الوثيقة
async function doGenerate(){
  const missing = validate();
  if(missing.length){
    showAlert('formAlert','err',
      '⚠️ الحقول المطلوبة: ' + missing.slice(0,3).join('، ') + (missing.length>3 ? '...' : ''));
    return;
  }

  // إزالة تظليل الأخطاء
  document.querySelectorAll('.finp,.fsel,.farea').forEach(el=>{
    el.style.borderColor = '';
    el.style.boxShadow = '';
  });

  const btn  = document.getElementById('genBtn');
  const btn2 = document.getElementById('genBtn2');
  btn.disabled  = true;
  btn2.disabled = true;
  btn.innerHTML  = '<span class="spin">⏳</span> <span>جاري التوليد...</span>';
  btn2.textContent = '⏳ جاري التوليد...';

  try{
    const r = await fetch('/api/docs/gen/'+docType, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify(getFormData())
    }).then(x=>x.json());

    if(r.success){
      currentHTML = r.html;
      const frame = document.getElementById('previewFrame');
      document.getElementById('previewEmpty').style.display = 'none';
      frame.style.display = 'block';
      frame.srcdoc = r.html;
      document.getElementById('previewToolbar').classList.add('on');
      ['printBtn','saveBtn','pdfBtn','shareBtn'].forEach(id=>{
        document.getElementById(id).style.display = 'flex';
      });
      showAlert('formAlert','ok','✅ تم توليد الوثيقة! يمكنك طباعتها أو تحميلها.');
    } else {
      showAlert('formAlert','err', r.message || 'خطأ في التوليد، حاول مرة أخرى');
    }
  } catch(e){
    showAlert('formAlert','err','⚠️ خطأ في الاتصال بالخادم');
  }

  btn.disabled  = false;
  btn2.disabled = false;
  btn.innerHTML  = '⚡ <span>توليد</span>';
  btn2.textContent = '⚡ توليد الوثيقة';
}

// ── طباعة
function doPrint(){
  const frame = document.getElementById('previewFrame');
  if(!frame.contentWindow) return;
  frame.contentWindow.focus();
  frame.contentWindow.print();
}

// ── تحميل PDF (فتح نافذة طباعة → حفظ كـ PDF)
function doPDF(){
  if(!currentHTML){showAlert('formAlert','err','ولّد الوثيقة أولاً');return;}
  // إضافة تلميح للمستخدم
  showAlert('formAlert','info','💡 في نافذة الطباعة اختر "حفظ كـ PDF" أو "Microsoft Print to PDF"');

  const blob = new Blob([currentHTML], {type:'text/html;charset=utf-8'});
  const url  = URL.createObjectURL(blob);
  const win  = window.open(url, '_blank');
  if(win){
    win.addEventListener('load', ()=>{
      setTimeout(()=>win.print(), 600);
    });
    setTimeout(()=>URL.revokeObjectURL(url), 90000);
  } else {
    // Popup blocked — تحميل مباشر
    const a = document.createElement('a');
    a.href = url;
    a.download = (tplData?.title||'وثيقة').replace(/\s+/g,'_') + '.html';
    a.click();
    setTimeout(()=>URL.revokeObjectURL(url), 5000);
    showAlert('formAlert','info','📥 جاري تحميل الملف...');
  }
}

// ── حفظ في وثائقي
async function doSave(){
  if(!currentHTML){showAlert('formAlert','err','ولّد الوثيقة أولاً');return;}
  const btn = document.getElementById('saveBtn');
  const orig = btn.innerHTML;
  btn.disabled = true;
  btn.innerHTML = '⏳';
  const r = await fetch('/api/docs/gen/'+docType, {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify(getFormData())
  }).then(x=>x.json());
  if(r.success){
    showAlert('formAlert','ok','💾 تم الحفظ في وثائقي');
    clearDraft(); // مسح الـ draft بعد الحفظ الناجح
    btn.innerHTML = '✅';
    setTimeout(()=>{btn.innerHTML=orig; btn.disabled=false;}, 2000);
  } else {
    showAlert('formAlert','err','خطأ في الحفظ');
    btn.innerHTML = orig;
    btn.disabled = false;
  }
}

// ── تنبيه إذا غادر المستخدم مع بيانات غير محفوظة
window.addEventListener('beforeunload', e=>{
  const data = getFormData ? getFormData() : {};
  const hasData = Object.values(data).some(v => v && String(v).trim());
  if(hasData && !currentHTML){
    e.preventDefault();
    e.returnValue = '';
  }
});

// ── اختصارات لوحة المفاتيح
document.addEventListener('keydown', e=>{
  if(e.ctrlKey && e.key==='Enter'){e.preventDefault(); doGenerate();}
  if(e.ctrlKey && e.key==='p' && currentHTML){e.preventDefault(); doPrint();}
  if(e.ctrlKey && e.key==='s' && currentHTML){e.preventDefault(); doSave();}
});

function showAlert(id,type,msg){
  const el = document.getElementById(id);
  const cls = type==='ok'?'ok':type==='info'?'info':'err';
  el.className = 'alert on alert-'+cls;
  el.textContent = msg;
  clearTimeout(el._t);
  el._t = setTimeout(()=>el.classList.remove('on'), 7000);
}

// ── Zoom preview
let zoomLevel = 100;
function zoomPreview(delta){
  zoomLevel = Math.max(50, Math.min(150, zoomLevel + delta));
  const frame = document.getElementById('previewFrame');
  frame.style.transform = `scale(${zoomLevel/100})`;
  frame.style.transformOrigin = 'top center';
  frame.style.height = `${100 / (zoomLevel/100)}%`;
  document.getElementById('zoomLbl').textContent = zoomLevel + '%';
}

// ── مشاركة الوثيقة (Web Share API)
async function doShare(){
  if(!currentHTML){ showAlert('formAlert','err','ولّد الوثيقة أولاً'); return; }
  const title = tplData?.title || 'وثيقة رسمية';
  const text  = `📄 ${title} — وثيقتي | منصة الوثائق الرسمية الجزائرية`;

  // Web Share API — موبايل وبعض سطح المكتب
  if(navigator.share){
    try{
      // مشاركة كملف HTML
      const blob = new Blob([currentHTML], {type:'text/html;charset=utf-8'});
      const file = new File([blob], (title+'.html').replace(/\s+/g,'_'), {type:'text/html'});
      if(navigator.canShare && navigator.canShare({files:[file]})){
        await navigator.share({ title, text, files:[file] });
      } else {
        await navigator.share({ title, text, url: window.location.href });
      }
      return;
    } catch(e){
      if(e.name === 'AbortError') return; // المستخدم أغلق يدوياً
    }
  }

  // Fallback: نسخ الرابط للحافظة
  try{
    await navigator.clipboard.writeText(window.location.href);
    showAlert('formAlert','ok','🔗 تم نسخ رابط الصفحة — شاركه مع من تريد');
  } catch(e){
    showAlert('formAlert','info','🔗 رابط الوثيقة: ' + window.location.href);
  }
}

init();
</script>
