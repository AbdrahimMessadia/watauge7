<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>404 — الصفحة غير موجودة | وثيقتي</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Cairo',sans-serif;background:#04080F;color:#E8E4D8;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;text-align:center}
.container{max-width:520px}
.code{font-size:clamp(80px,20vw,140px);font-weight:900;background:linear-gradient(135deg,#C9A84C,#E8C97A);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1;margin-bottom:8px}
.title{font-size:clamp(20px,4vw,28px);font-weight:700;margin-bottom:14px;color:#E8C97A}
.desc{font-size:15px;color:#8A9AB8;line-height:1.8;margin-bottom:36px}
.btn{display:inline-flex;align-items:center;gap:9px;padding:13px 32px;background:linear-gradient(135deg,#C9A84C,#E8C97A);color:#000;border:none;border-radius:12px;font-family:'Cairo',sans-serif;font-size:15px;font-weight:700;cursor:pointer;text-decoration:none;transition:all 0.25s}
.btn:hover{transform:translateY(-2px);box-shadow:0 12px 30px rgba(201,168,76,0.35)}
.btn:active{transform:scale(0.97)}
.ico{font-size:72px;margin-bottom:22px;display:block}
</style>
</head>
<body>
<div class="container">
  <span class="ico">📄</span>
  <div class="code">404</div>
  <div class="title">الصفحة غير موجودة</div>
  <p class="desc">عذراً، الصفحة التي تبحث عنها غير موجودة أو تم نقلها.</p>
  <a href="/" class="btn">🏠 العودة للرئيسية</a>
</div>
</body>
</html>
